<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>英文对话翻译与发音学习器 | 图片内容助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #f0f7ff 0%, #e9eef5 100%);
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 2rem 1.5rem;
            color: #1a2c3e;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .hero {
            background: #1e3c5c;
            padding: 1.8rem 2rem;
            color: white;
            border-bottom: 4px solid #ffb347;
        }
        .hero h1 {
            font-size: 1.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .hero h1 small {
            font-size: 0.9rem;
            background: #ffb34730;
            padding: 4px 12px;
            border-radius: 40px;
        }
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            padding: 2rem;
        }
        .card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border: 1px solid #eef2f8;
        }
        .card-header {
            background: #f8fafd;
            padding: 1rem 1.5rem;
            border-bottom: 2px solid #e2e8f0;
            font-weight: 600;
            font-size: 1.3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .card-header h2 { font-size: 1.3rem; color: #0f2b3d; }
        .badge {
            background: #dee5ed;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            color: #2c4b6e;
        }
        .card-content { padding: 1.5rem; }
        .dialogue-item {
            margin-bottom: 1.2rem;
            border-left: 3px solid #ffb347;
            padding-left: 1rem;
        }
        .dialogue-line {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 8px 12px;
            margin-bottom: 8px;
        }
        .speaker {
            font-weight: 700;
            color: #b45309;
            background: #fff1e6;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
            min-width: 80px;
            text-align: center;
        }
        .en-text {
            font-size: 1rem;
            font-weight: 500;
            color: #1e4663;
            background: #f1f6fe;
            padding: 6px 12px;
            border-radius: 20px;
            flex: 1;
        }
        .zh-text {
            font-size: 0.95rem;
            color: #2c5a2e;
            background: #eff7ea;
            padding: 6px 12px;
            border-radius: 20px;
            margin-top: 6px;
        }
        .pronounce-btn {
            background: #eef2fa;
            border: 1px solid #cddfed;
            cursor: pointer;
            font-size: 1rem;
            border-radius: 40px;
            padding: 0 12px;
            height: 34px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #2c3e66;
        }
        .pronounce-btn:hover {
            background: #ffe5cc;
            border-color: #ffb347;
        }
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
        }
        .vocab-card {
            background: #fefcf5;
            border-radius: 1rem;
            padding: 0.8rem 1rem;
            border: 1px solid #e9e0cf;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .vocab-word {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .word-en {
            font-weight: 700;
            font-size: 1.1rem;
            color: #ad4b1c;
        }
        .part-of-speech {
            font-size: 0.7rem;
            background: #e9e2d4;
            padding: 2px 8px;
            border-radius: 20px;
        }
        .vocab-meaning { font-size: 0.9rem; color: #2c5c3a; }
        .pronounce-mini {
            background: none;
            border: 1px solid #ddceb5;
            padding: 4px 12px;
            font-size: 0.7rem;
            border-radius: 40px;
            cursor: pointer;
            width: fit-content;
            color: #a1622d;
        }
        .pronounce-mini:hover { background: #ffedd5; border-color: #ffb347; }
        .audio-toast {
            position: fixed;
            bottom: 25px;
            right: 30px;
            background: #1e3c5cee;
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            z-index: 1000;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        footer {
            text-align: center;
            font-size: 0.8rem;
            color: #6a7c8f;
            padding: 1rem 2rem 1.8rem;
            border-top: 1px solid #e2edf2;
        }
        @media (max-width: 780px) {
            .content-grid { grid-template-columns: 1fr; padding: 1.5rem; }
            body { padding: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>📖 图片内容 · 英文对话与词汇 <small>中英对照 + 标准发音</small></h1>
        <p>源自《对话与词汇》图片素材 | 点击 🔊 按钮可聆听地道英语发音 (Web Speech API)</p>
    </div>
    <div class="content-grid">
        <div class="card">
            <div class="card-header"><h2>💬 情景对话</h2><span class="badge">日常交流 · 购物/省钱话题</span></div>
            <div class="card-content" id="dialogueContainer"></div>
        </div>
        <div class="card">
            <div class="card-header"><h2>📚 核心词汇</h2><span class="badge">点击小喇叭听发音</span></div>
            <div class="card-content" id="vocabContainer"></div>
        </div>
    </div>
    <footer>⚡ 使用浏览器内置语音合成 (Web Speech API) — 支持英文发音，点击任意喇叭图标即刻朗读英文原句/单词</footer>
</div>
<div id="audioToast" class="audio-toast" style="opacity:0;">🔊 准备就绪</div>

<script>
    const dialogues = [
        { speaker: "Barbara", en: "You're a clotheshorse.", zh: "你真是个爱打扮的人。" },
        { speaker: "Harriet", en: "I know. I love dressing up.", zh: "我知道，我喜欢打扮得漂漂亮亮的。" },
        { speaker: "Barbara", en: "Do you shop around a lot for bargains?", zh: "你会经常去逛打折商品吗？" },
        { speaker: "Harriet", en: "I'm lucky. I work for a department store and I get a discount on merchandise.", zh: "我很幸运。我在一家百货商店工作，买商品可以享受折扣。" },
        { speaker: "Barbara", en: "That's great because everything is sky-high.", zh: "那太好了，因为现在所有东西都贵得离谱。" },
        { speaker: "Harriet", en: "I know. My salary is not high, but we make ends meet.", zh: "我知道。我的工资不高，但我们能收支平衡。" },
        { speaker: "Barbara", en: "We have to cut corners.", zh: "我们不得不精打细算。" },
        { speaker: "Harriet", en: "Me too. I've cut down on luxuries.", zh: "我也是。我已经减少了在奢侈品上的开支。" }
    ];
    const vocabularies = [
        { word: "clotheshorse", pos: "n.", definition: "爱打扮的人，衣着时髦的人", extra: "a conspicuously well-dressed person" },
        { word: "dress up", pos: "v.", definition: "穿最好的衣服，盛装打扮", extra: "wear one's best clothes" },
        { word: "shop around", pos: "v.", definition: "逛商店比较价格，货比三家", extra: "look in many stores" },
        { word: "great", pos: "adj.", definition: "太棒了，极好的", extra: "terrific, wonderful" },
        { word: "sky-high", pos: "adj.", definition: "极高的，贵得离谱的", extra: "extremely high" },
        { word: "make ends meet", pos: "v.", definition: "收支平衡，勉强维持生计", extra: "earn enough to pay one's expenses" },
        { word: "cut corners", pos: "v.", definition: "精打细算，缩减预算", extra: "limit one's budget, meet one's payments" },
        { word: "cut down on", pos: "v.", definition: "减少用量，削减开支", extra: "use less, reduce" }
    ];
    let currentUtterance = null;
    const toastEl = document.getElementById('audioToast');
    function showToastMessage(message, isError) {
        if (!toastEl) return;
        toastEl.textContent = (isError ? '⚠️ ' : '🔊 ') + message;
        toastEl.style.opacity = '1';
        setTimeout(() => toastEl.style.opacity = '0', 1800);
    }
    function speakEnglish(text) {
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        if (!window.speechSynthesis) { showToastMessage("浏览器不支持语音", true); return; }
        const utterance = new SpeechSynthesisUtterance(text.replace(/[^\w\s'\-.,!?]/g, ''));
        utterance.lang = 'en-US';
        utterance.rate = 0.92;
        utterance.onstart = () => showToastMessage(`朗读: ${text.substring(0, 45)}${text.length > 45 ? '…' : ''}`);
        utterance.onerror = () => showToastMessage("发音出错", true);
        currentUtterance = utterance;
        window.speechSynthesis.speak(utterance);
    }
    function renderDialogues() {
        const container = document.getElementById('dialogueContainer');
        container.innerHTML = '';
        dialogues.forEach(item => {
            const div = document.createElement('div');
            div.className = 'dialogue-item';
            const lineDiv = document.createElement('div');
            lineDiv.className = 'dialogue-line';
            const speakerSpan = document.createElement('span'); speakerSpan.className = 'speaker'; speakerSpan.textContent = item.speaker;
            const enSpan = document.createElement('span'); enSpan.className = 'en-text'; enSpan.textContent = item.en;
            const btn = document.createElement('button'); btn.className = 'pronounce-btn'; btn.innerHTML = '🔊 发音';
            btn.onclick = () => speakEnglish(item.en);
            lineDiv.append(speakerSpan, enSpan, btn);
            const zhDiv = document.createElement('div'); zhDiv.className = 'zh-text'; zhDiv.textContent = item.zh;
            div.append(lineDiv, zhDiv);
            container.appendChild(div);
        });
    }
    function renderVocabulary() {
        const container = document.getElementById('vocabContainer');
        const grid = document.createElement('div');
        grid.className = 'vocab-grid';
        vocabularies.forEach(v => {
            const card = document.createElement('div');
            card.className = 'vocab-card';
            const header = document.createElement('div');
            header.className = 'vocab-word';
            const wordSpan = document.createElement('span'); wordSpan.className = 'word-en'; wordSpan.textContent = v.word;
            const posSpan = document.createElement('span'); posSpan.className = 'part-of-speech'; posSpan.textContent = v.pos;
            header.append(wordSpan, posSpan);
            const meaning = document.createElement('div');
            meaning.className = 'vocab-meaning';
            meaning.innerHTML = `<strong>📖 释义：</strong> ${v.definition}<br><span style="font-size:0.75rem;">📘 ${v.extra}</span>`;
            const btn = document.createElement('button');
            btn.className = 'pronounce-mini';
            btn.innerHTML = '🔊 发音 · ' + v.word;
            btn.onclick = () => speakEnglish(v.word);
            card.append(header, meaning, btn);
            grid.appendChild(card);
        });
        container.innerHTML = '';
        container.appendChild(grid);
    }
    document.addEventListener('DOMContentLoaded', () => {
        renderDialogues();
        renderVocabulary();
        if (!window.speechSynthesis) {
            const warn = document.createElement('div');
            warn.style.cssText = 'background:#ffecb3;padding:12px;margin:16px;border-radius:24px';
            warn.innerText = '⚠️ 您的浏览器不支持语音合成，请使用Chrome/Edge/Safari。';
            document.querySelector('.container')?.prepend(warn);
        } else {
            setTimeout(() => showToastMessage("✨ 点击喇叭按钮 🔊 即可听到纯正英文发音", false), 600);
        }
    });
</script>
</body>
</html>
