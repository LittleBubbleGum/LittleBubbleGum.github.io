    }

    body {

      margin: 0;
      padding: 20px;

    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 28px;

      padding: 1rem 0.5rem 1.5rem 0.5rem;
    }

      text-align: center;

      margin: 0.5rem 0 0.25rem;
      color: #0b3b5f;

      padding: 0 1rem;
    }

    .sub {
      text-align: center;
      color: #4a6a85;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid #e2edf7;
      display: inline-block;
      width: auto;
      margin-left: auto;
      margin-right: auto;
      padding-bottom: 8px;
      font-size: 1rem;

    .description {
      text-align: center;
      font-size: 0.9rem;
      background: #eef3fc;

      width: auto;
      margin: 0 auto 1.2rem;
      padding: 6px 18px;
      border-radius: 40px;
      color: #0056a7;
    }

    /* 表格样式 */
    .word-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      min-width: 680px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    .word-table th {
      background: #1e4663;
      color: white;
      padding: 14px 10px;
      font-weight: 600;
      font-size: 1rem;
      position: sticky;
      top: 0;
      backdrop-filter: blur(2px);
    }

    .word-table td {
      border-bottom: 1px solid #dce5ec;
      padding: 12px 8px;
      vertical-align: middle;
      background-color: #ffffff;
      transition: background 0.1s ease;
    }

    .word-table tr:hover td {
      background-color: #f6fafe;
    }

    /* 发音按钮样式 */
    .pronounce-btn {
      background: #eef2f8;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      padding: 6px 10px;
      margin-left: 8px;
      border-radius: 40px;
      transition: all 0.2s;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #1e4663;
      font-weight: 500;
    }

    .pronounce-btn:hover {
      background: #d9e4f0;
      transform: scale(1.02);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    .pronounce-btn:active {
      transform: scale(0.97);
    }

    .word-cell {
      font-weight: 500;
      color: #0f2c3f;
      word-break: break-word;
    }

    .language-cell {
      color: #1f5e3a;
      font-weight: 500;
    }

    .nationality-adj,
    .nationality-noun {
      color: #2c5282;
    }

    /* 扬声器小图标 */
    .speaker-icon {
      font-size: 1rem;
      pointer-events: none;
    }

    /* 手机适配 */
    @media (max-width: 760px) {
      body {
        padding: 12px;
      }

      .word-table th,
      .word-table td {
        padding: 8px 6px;
        font-size: 0.8rem;
      }

      .pronounce-btn {
        padding: 4px 8px;
        font-size: 1rem;
      }

      .speaker-icon {
        font-size: 0.85rem;
      }
    }

    footer {

      font-size: 0.75rem;

    }

      margin: 0 1rem 1.2rem 1rem;
      border-radius: 14px;
      font-size: 0.8rem;
      color: #8a6e2d;
    }

</head>

    // 辅助函数：创建带发音按钮的单元格内容 (文本 + 按钮)
    function createSpeakableCell(text, displayText = null) {
      if (!text || text.trim() === "") text = "—";
      const display = displayText !== null ? displayText : text;
      // 清理可能的多重斜杠影响显示，但是保留原始文本用于朗读
      const rawTextForSpeech = text;
      const container = document.createElement('div');
      container.style.display = 'flex';
      container.style.alignItems = 'center';
      container.style.justifyContent = 'space-between';
      container.style.flexWrap = 'wrap';
      container.style.gap = '6px';

      const textSpan = document.createElement('span');
      textSpan.className = 'word-cell';
      textSpan.innerText = display;
      textSpan.style.flex = '1';

      const btn = document.createElement('button');
      btn.className = 'pronounce-btn';
      btn.setAttribute('aria-label', `朗读: ${rawTextForSpeech}`);
      btn.innerHTML = `<span class="speaker-icon">🔊</span> <span style="font-size:0.7rem;">发音</span>`;

      // 语音朗读逻辑
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        speakText(rawTextForSpeech);
      });

      container.appendChild(textSpan);
      container.appendChild(btn);
      return container;
    }

    // 对于语言字段特殊处理，确保长文本也支持朗读
    function createLanguageCell(languageStr) {
      if (!languageStr) languageStr = "—";
      const container = document.createElement('div');
      container.style.display = 'flex';
      container.style.alignItems = 'center';
      container.style.justifyContent = 'space-between';
      container.style.flexWrap = 'wrap';
      container.style.gap = '6px';

      const langSpan = document.createElement('span');
      langSpan.className = 'language-cell';
      langSpan.innerText = languageStr;
      langSpan.style.flex = '1';

      const btn = document.createElement('button');
      btn.className = 'pronounce-btn';
      btn.innerHTML = `<span class="speaker-icon">🔊</span> <span style="font-size:0.7rem;">发音</span>`;
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        speakText(languageStr);
      });
      container.appendChild(langSpan);
      container.appendChild(btn);
      return container;
    }

    // 核心朗读函数 (使用 Web Speech API)
    let currentUtterance = null;
    function speakText(text) {
      // 取消任何正在播放的语音，避免重叠
      if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
        window.speechSynthesis.cancel();
      }
      // 过滤掉空或者太奇怪的内容
      let cleanText = text.trim();
      if (cleanText === "") return;
      // 处理一些特殊符号，让发音更友好：将 '/' 替换为 ' or ' 但保留原意，增强可读性
      // 但直接朗读也还好，为了自然替换斜杠发音
      let utteranceText = cleanText.replace(/\//g, ' or ');
      utteranceText = utteranceText.replace(/ - /g, ', ');

      const utterance = new SpeechSynthesisUtterance(utteranceText);
      // 尝试选择英文语音，确保大多数单词发音准确 (国籍、国家均为英文名)
      utterance.lang = 'en-US';
      utterance.rate = 0.9;
      utterance.pitch = 1.0;

      // 选取更好的语音 (优先 Google 或 Microsoft 英文)
      if (window.speechSynthesis.getVoices) {
        let voices = window.speechSynthesis.getVoices();
        const preferredVoice = voices.find(voice => voice.lang === 'en-US' && voice.name.includes('Google')) ||
          voices.find(voice => voice.lang === 'en-US' && voice.name.includes('Microsoft')) ||
          voices.find(voice => voice.lang === 'en-US');
        if (preferredVoice) utterance.voice = preferredVoice;
      }

      utterance.onerror = (event) => {
        console.warn("语音错误", event);
      };
      window.speechSynthesis.speak(utterance);
      currentUtterance = utterance;
    }

    // 为了确保voices异步加载后按钮依然正常，预加载一次语音（无副作用）
    if (typeof window.speechSynthesis !== 'undefined') {
      window.speechSynthesis.getVoices();
      // 有些浏览器需要延迟加载
      if (window.speechSynthesis.onvoiceschanged !== undefined) {
        window.speechSynthesis.onvoiceschanged = () => { };
      }
    }

    // 渲染表格
    function renderTable() {
      const tbody = document.getElementById('tableBody');
      if (!tbody) return;
      tbody.innerHTML = '';

      countriesData.forEach(item => {
        const row = tbody.insertRow();

        // 国家列
        const countryCell = row.insertCell(0);
        const countryContainer = createSpeakableCell(item.country);
        countryCell.appendChild(countryContainer);

        // 国籍(形容词)列
        const adjCell = row.insertCell(1);
        const adjContainer = createSpeakableCell(item.nationalityAdj);
        adjCell.appendChild(adjContainer);

        // 国籍名词列
        const nounCell = row.insertCell(2);
        const nounContainer = createSpeakableCell(item.nationalityNoun);
        nounCell.appendChild(nounContainer);

        // 语言列
        const langCell = row.insertCell(3);
        const langContainer = createLanguageCell(item.language);
        langCell.appendChild(langContainer);
      });
    }

    // 页面加载完毕后渲染
